<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media & Production Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; }
    .container { display: flex; min-height: 100vh; flex-direction: column; }
    @media (min-width: 768px) { .container { flex-direction: row; } }
    .panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem;
      text-decoration: none;
      color: #fff;
      text-align: center;
      transition: filter 0.2s;
    }
    .panel:hover { filter: brightness(1.05); }
        .pink { 
      background-image: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), url('portfolio-bg.jpg'); 
      background-size: cover;
      background-position: center;
    }
    .blue { 
      background-image: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), url('travel-bg.jpg'); 
      background-size: cover;
      background-position: center;
    }
    .panel h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      transition: transform 0.2s;
    }
    .panel:hover h1 { transform: scale(1.05); }
    .panel .sub {
      display: block;
      font-size: 1.5rem;
      font-weight: 600;
    }
    @media (min-width: 768px) {
      .panel { padding: 0 2rem; }
      .panel h1 { font-size: 3.75rem; }
      .panel .sub { font-size: 1.875rem; }
    }
    .pill {
      position: fixed;
      left: 50%;
      top: 1.5rem;
      transform: translateX(-50%);
      background: #fff;
      border-radius: 9999px;
      padding: 0.5rem 1rem;
      font-size: 1.25rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      z-index: 10;
    }
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.5rem;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(0,0,0,0.7);
      pointer-events: none;
    }
    @media (prefers-color-scheme: dark) {
      .footer { color: rgba(255,255,255,0.7); }
    }
  </style>
</head>
<body>
  <div class="pill">🏴󠁧󠁢󠁳󠁣󠁴󠁿 🎬 ✈️</div>

  <div class="container">
    <a href="media-and-production.html" class="panel pink">
      <h1>
        Media and Production
        <span class="sub">Portfolio</span>
      </h1>
    </a>

    <a href="blogs.html" class="panel blue">
      <h1>
        My personal
        <span class="sub">travel blogs</span>
      </h1>
    </a>
  </div>

  <div class="footer">Platform Custom Built, Designed & Developed by Liam Black</div>
</body>
</html>
